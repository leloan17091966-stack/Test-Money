body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#counter{
    font-size:80px;
    letter-spacing:10px;
    background:#000;
    padding:20px 40px;
    border-radius:10px;
    border:3px solid #444;
    margin-bottom:30px;
}

button{
    font-size:20px;
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.plus{ background:#00c853; color:white;}
.minus{ background:#d50000; color:white;}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>KBI Quản Lý Dòng Tiền</h1>

<div id="counter">0000</div>

<div>
<button class="plus" onclick="change(1)">+1</button>
<button class="minus" onclick="change(-1)">-1</button>
<button class="plus" onclick="change(10)">+10</button>
<button class="minus" onclick="change(-10)">-10</button>
</div>

<script>

// lấy dữ liệu đã lưu
let value = localStorage.getItem("kbi_money");

if(value === null){
    value = 0;
}else{
    value = parseInt(value);
}

function updateDisplay(){
    document.getElementById("counter").textContent =
        value.toString().padStart(4,'0');

    // lưu lại
    localStorage.setItem("kbi_money", value);
}

function change(num){

    value += num;

    if(value < 0) value = 0;
    if(value > 9999) value = 9999;

    updateDisplay();
}

updateDisplay();

</script>
</body>
</html>
